<form class="form-container" (submit)="$event.preventDefault(); onSubmit()">
  <app-input
    id="otp"
    name="otp"
    placeholder="Enter OTP Code"
    label="Enter OTP Code"
    icon="lock"
    [required]="true"
  ></app-input>
  @if (timeLeft() > 0) {
  <div class="resend-container">
    <p class="resend-text">
      Resend code in <span class="resend-timer">{{ formattedTime() }}</span>
    </p>
  </div>
  <app-button label="Verify Code" icon="arrow_forward" type="submit"></app-button>
  } @else {
  <div class="flex justify-center text-label-md text-on-surface-variant">
    <app-button-line label="Resend Code" type="button" (click)="resendCode()"></app-button-line>
  </div>
  <app-button
    label="Back to Login"
    icon="arrow_back"
    type="button"
    (click)="onBackToLogin()"
  ></app-button>
  }
</form>
