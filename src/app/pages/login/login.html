<div class="language-selector">
  <app-dropdown
    [label]="selectedLanguage().label"
    icon="language"
    [options]="languageOptions"
    (optionSelected)="onLanguageSelected($event)"
  ></app-dropdown>
</div>
<main class="main-container">
  <header class="header">
    <h1 class="title">Ocean Shop</h1>
  </header>
  <section
    class="login-card"
    [class.m3-elevation-3]="isFocused()"
    [class.m3-elevation-2]="!isFocused()"
  >
    <div class="welcome-section">
      <h2 class="subtitle">Welcome back</h2>
      <p class="description">Sign in to manage your inventory and orders.</p>
    </div>
    <form class="form-container" (submit)="$event.preventDefault()">
      <div class="m3-textfield group">
        <div class="relative">
          <div class="input-icon-container">
            <span class="material-symbols-outlined">person</span>
          </div>
          <app-input
            id="identity"
            name="identity"
            placeholder="Email or Phone Number"
            [required]="true"
            (focusEvent)="isFocused.set(true)"
            (blurEvent)="isFocused.set(false)"
          ></app-input>
          <label class="font-body-md text-outline" for="identity">Email or Phone Number</label>
        </div>
      </div>
      <app-button label="Sign In" icon="arrow_forward" type="submit"></app-button>
    </form>
  </section>
  <div class="decorative-bar"></div>
</main>
