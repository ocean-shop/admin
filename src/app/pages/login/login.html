<div class="fixed top-lg right-lg z-50">
  <app-dropdown
    [label]="selectedLanguage().label"
    icon="language"
    [options]="languageOptions"
    (optionSelected)="onLanguageSelected($event)"
  ></app-dropdown>
</div>
<main class="w-full max-w-[440px] px-margin-mobile md:px-0 flex flex-col items-center pt-32">
  <!-- Header / Logo -->
  <header class="mb-xl text-center">
    <h1
      class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight font-extrabold"
    >
      Ocean Shop
    </h1>
  </header>
  <!-- Login Card (M3 Elevation 2) -->
  <section
    [class]="'w-full bg-surface-container-lowest rounded-xl p-lg md:p-xl border border-secondary-container/10 transition-shadow duration-300 ' + (isFocused() ? 'm3-elevation-3' : 'm3-elevation-2')"
  >
    <div class="mb-lg">
      <h2 class="font-title-md text-title-md text-on-surface mb-xs">Welcome back</h2>
      <p class="font-body-sm text-body-sm text-on-surface-variant">
        Sign in to manage your inventory and orders.
      </p>
    </div>
    <form class="space-y-lg" (submit)="$event.preventDefault()">
      <!-- M3 Outlined Text Field -->
      <div class="m3-textfield group">
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors z-10"
          >
            <span class="material-symbols-outlined">person</span>
          </div>
          <app-input
            id="identity"
            name="identity"
            placeholder="Email or Phone Number"
            [required]="true"
            (focusEvent)="isFocused.set(true)"
            (blurEvent)="isFocused.set(false)"
          ></app-input>
          <label class="font-body-md text-outline" for="identity">Email or Phone Number</label>
        </div>
      </div>
      <!-- Primary Action (M3 Raised Button Style) -->
      <app-button label="Sign In" icon="arrow_forward" type="submit"></app-button>
    </form>
    <div class="mt-xl pt-lg border-t border-secondary-container/20 text-center">
      <!-- Footer space -->
    </div>
  </section>
  <!-- Decorative Atmospheric Element -->
  <div
    class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-primary-fixed to-tertiary-fixed opacity-30"
  ></div>
</main>
